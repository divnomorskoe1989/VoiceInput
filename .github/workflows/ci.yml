name: ci
on: [push, pull_request]
defaults:
  run:
    working-directory: Voiceinput_recovered
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest -q --ignore=test_sound.py --ignore=test_quality_soak.py -k "not test_audio_recorder"
